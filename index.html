<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindsight — Chemistry Trial Papers</title>
<style>html,body{margin:0;padding:0;height:100%}</style>
<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/dm-serif-display@5.0.19/index.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.0.19/400.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.0.19/500.css');
*{box-sizing:border-box;margin:0;padding:0}
.app{font-family:'DM Sans',system-ui,sans-serif;color:#1d211a;background:#faf9f5;min-height:100vh;--g:#2D5016;--g7:#3d6a22;--g50:#eef3e8;--ink:#1d211a;--mut:#74796d;--ln:#e6e3d8;--paper:#faf9f5;--card:#fff}
.serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400;letter-spacing:-.01em}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:0.5px solid var(--ln);background:var(--card);position:sticky;top:0;z-index:10}
.wm{font-family:'DM Serif Display',Georgia,serif;font-size:23px;color:var(--g);letter-spacing:-.01em;text-decoration:none}
.nav-right{font-size:13px;color:var(--mut)}

/* GREETING */
.greet-bar{padding:32px 40px 28px;border-bottom:0.5px solid var(--ln)}
.greet-title{font-family:'DM Serif Display',Georgia,serif;font-size:52px;color:var(--ink);margin-top:16px;letter-spacing:-.02em;line-height:1.1}
.insight{background:var(--card);border:0.5px solid var(--ln);border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:12px;max-width:560px}
.mod-badge{width:36px;height:36px;border-radius:8px;background:#f7eedb;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#a96a12;flex-shrink:0}
.insight-txt{font-size:13.5px;color:var(--ink);line-height:1.5}
.insight-txt span{color:var(--mut);font-size:12px;display:block;margin-top:2px}

/* SECTIONS */
.section{padding:28px 40px}
.section.alt{background:#edeae0}
.section+.section{border-top:0.5px solid var(--ln)}
.section.alt+.section{border-top:none}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.sec-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--ink);letter-spacing:-.01em}
.sec-sub{font-size:12px;color:var(--mut)}

/* GRIDS */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* PAPER CARDS */
.card{background:var(--card);border:0.5px solid var(--ln);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.card:hover{border-color:#a8c4d8;transform:translateY(-5px);background:#eef4f8}
.card-band{display:flex;height:14px;width:100%;}
.card-band-seg{height:100%;}
.card-body{padding:16px 18px 18px;}
.card-type{font-size:10px;font-weight:500;color:var(--g7);background:var(--g50);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:10px;letter-spacing:.04em}
.card-title{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--ink);line-height:1.2;margin-bottom:3px;letter-spacing:-.02em}
.card-year{font-size:12px;color:var(--mut);margin-bottom:14px}
.mod-leg{display:flex;gap:9px;margin-bottom:14px}
.mod-dot{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--mut)}
.mod-c{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-cta{font-size:12px;color:var(--g);font-weight:500}
.card-reviewed{font-size:12px;color:var(--mut)}

/* TOP 10 CARDS */
.t10-outer{overflow:hidden;cursor:default}
.t10-track{display:flex;gap:12px;width:max-content;animation:t10scroll 35s linear infinite}
@keyframes t10scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t10{background:var(--card);border:1px solid var(--ln);border-radius:12px;padding:18px 16px;cursor:pointer;flex:0 0 200px;transition:border-color .15s}
.t10:hover{border-color:#9ab88a}
.t10-num{font-family:'DM Serif Display',Georgia,serif;font-size:42px;color:#d8d4c8;line-height:1;margin-bottom:10px}
.t10-school{font-family:'DM Serif Display',Georgia,serif;font-size:15px;color:var(--ink);margin-bottom:3px;letter-spacing:-.01em;line-height:1.25}
.t10-sub{font-size:11px;color:var(--mut);margin-bottom:12px}
.t10-bar{display:flex;gap:2px}
.t10-seg{height:4px;border-radius:2px}

/* SOON */
.soon{background:var(--paper);border:0.5px dashed #d0cdc2;cursor:default}
.soon:hover{border-color:#d0cdc2;transform:none}
.soon .card-title{color:#bbb}
.soon-tag{font-size:11px;color:#bbb;margin-top:5px}
</style>
</head>
<body>
<div class="app" id="app">

  <nav class="nav">
    <a href="library.html" class="wm">Hindsight</a>
    <div style="font-size:13px;font-weight:500;padding:5px 13px;border-radius:20px;background:var(--g50);color:var(--g);">Chemistry · Year 12</div>
  </nav>

  <div class="greet-bar" id="greetBar">
    <div id="insightSlot"></div>
    <div class="greet-title" id="greetTitle">Chemistry trial papers.</div>
    <div style="font-size:13px;color:var(--mut);margin-top:8px;">Pick a paper &nbsp;→&nbsp; enter your marks &nbsp;→&nbsp; get your diagnostic. About 10 minutes.</div>
  </div>

  <!-- RECOMMENDED NEXT -->
  <div class="section" id="recSection" style="display:none">
    <div class="sec-head">
      <div class="sec-title">Recommended next</div>
      <div class="sec-sub" id="recSub">Based on your last paper</div>
    </div>
    <div class="grid3" id="recGrid"></div>
  </div>

  <!-- TOP 10 -->
  <div class="section alt">
    <div class="sec-head">
      <div class="sec-title">Top 10 in Sydney</div>
      <div class="sec-sub">Most reviewed this week</div>
    </div>
    <div class="t10-outer"><div class="t10-track" id="top10Grid"></div></div>
  </div>

  <!-- ALL PAPERS -->
  <div class="section">
    <div class="sec-head">
      <div class="sec-title">All papers</div>
      <div class="sec-sub" id="allSub">Chemistry · Year 12</div>
    </div>
    <div class="grid3" id="allGrid"></div>
  </div>

</div>
<script>
const PAPERS=[
  {id:'james-ruse-2024',school:'James Ruse',year:'2024',type:'Trial',url:'chemistry/james-ruse-2024.html',mods:[25,30,25,20]},
  {id:'sydney-boys-2024',school:'Sydney Boys',year:'2024',type:'Trial',url:'#',mods:[20,40,20,20]},
  {id:'north-sydney-girls-2024',school:'North Sydney Girls',year:'2024',type:'Trial',url:'#',mods:[25,25,30,20]},
  {id:'baulkham-hills-2024',school:'Baulkham Hills',year:'2024',type:'Trial',url:'#',mods:[20,25,25,30]},
  {id:'knox-grammar-2023',school:'Knox Grammar',year:'2023',type:'Trial',url:'#',mods:[30,20,30,20]},
  {id:'nbsc-manly-2024',school:'NBSC Manly',year:'2024',type:'Trial',url:'#',mods:[15,40,20,25]},
  {id:'normanhurst-2024',school:'Normanhurst Boys',year:'2024',type:'Trial',url:'#',soon:true},
  {id:'st-george-girls-2024',school:'St George Girls',year:'2024',type:'Trial',url:'#',soon:true},
  {id:'fort-street-2024',school:'Fort Street',year:'2024',type:'Trial',url:'#',soon:true},
];

const TOP10=[
  {school:'James Ruse 2024',sub:'284 reviews',mods:[25,30,25,20]},
  {school:'Sydney Boys 2024',sub:'201 reviews',mods:[20,40,20,20]},
  {school:'North Sydney Girls 2024',sub:'178 reviews',mods:[25,25,30,20]},
  {school:'Baulkham Hills 2024',sub:'155 reviews',mods:[20,25,25,30]},
  {school:'Knox Grammar 2023',sub:'132 reviews',mods:[30,20,30,20]},
  {school:'NBSC Manly 2024',sub:'119 reviews',mods:[15,40,20,25]},
  {school:'Normanhurst Boys 2024',sub:'98 reviews',mods:[25,25,20,30]},
  {school:'St George Girls 2024',sub:'87 reviews',mods:[20,30,30,20]},
  {school:'Fort Street 2024',sub:'74 reviews',mods:[30,25,25,20]},
  {school:'Cranbrook 2023',sub:'61 reviews',mods:[20,20,35,25]},
];

const MOD_COLS=['#6e9ab5','#c4892a','#6a9958','#b05a48'];
const MOD_LABELS=['M5','M6','M7','M8'];

function modBar(mods,h){
  return '<div style="display:flex;gap:2px;margin-bottom:'+h+'px">'+mods.map((v,i)=>'<div style="flex:'+v+';height:'+(h===8?4:5)+'px;border-radius:2px;background:'+MOD_COLS[i]+'"></div>').join('')+'</div>';
}
function modLeg(){
  return '<div style="display:flex;gap:9px;margin-bottom:14px">'+MOD_LABELS.map((l,i)=>'<div style="display:flex;align-items:center;gap:3px;font-size:10px;color:#74796d"><div style="width:6px;height:6px;border-radius:50%;background:'+MOD_COLS[i]+';flex-shrink:0"></div>'+l+'</div>').join('')+'</div>';
}

function paperCard(p,reviewed){
  const band='<div class="card-band">'+p.mods.map((v,i)=>'<div class="card-band-seg" style="flex:'+v+';background:'+MOD_COLS[i]+'"></div>').join('')+'</div>';
  if(p.soon){
    return '<div class="card soon" style="overflow:hidden;">'+band+'<div class="card-body"><div class="card-type" style="background:#f0ede3;color:#bbb">'+p.type.toUpperCase()+'</div><div class="card-title" style="color:#bbb">'+p.school+'</div><div class="card-year">'+p.year+'</div><div style="font-size:11px;color:#bbb;margin-top:4px;">Coming soon</div></div></div>';
  }
  const cta=reviewed?'<div class="card-reviewed">Reviewed · '+reviewed+'/100</div>':'<div class="card-cta">Start review →</div>';
  return '<div class="card" onclick="if(\''+p.url+'\'!==\'#\')location.href=\''+p.url+'\'">'+band+'<div class="card-body"><div class="card-type">'+p.type.toUpperCase()+'</div><div class="card-title">'+p.school+'</div><div class="card-year">'+p.year+'</div>'+modLeg()+cta+'</div></div>';
}

function paperCardSimple(p,reviewed){
  if(p.soon){
    return '<div class="card soon"><div class="card-body"><div class="card-type" style="background:#f0ede3;color:#bbb">'+p.type.toUpperCase()+'</div><div class="card-title" style="color:#bbb">'+p.school+'</div><div class="card-year">'+p.year+'</div><div style="font-size:11px;color:#bbb;margin-top:4px;">Coming soon</div></div></div>';
  }
  const cta=reviewed?'<div class="card-reviewed">Reviewed · '+reviewed+'/100</div>':'<div class="card-cta">Start review →</div>';
  return '<div class="card" onclick="if(\''+p.url+'\'!==\'#\')location.href=\''+p.url+'\'"><div class="card-body">'+
    '<div class="card-type">'+p.type.toUpperCase()+'</div>'+
    '<div class="card-title">'+p.school+'</div>'+
    '<div class="card-year">'+p.year+'</div>'+
    modBar(p.mods,9)+modLeg()+cta+
  '</div></div>';
}

function t10Card(t,n){
  return '<div class="t10"><div class="t10-num">'+(n+1)+'</div><div class="t10-school">'+t.school+'</div><div class="t10-sub">'+t.sub+'</div>'+modBar(t.mods,8)+'</div>';
}

// Load profile + history from localStorage
const profile=JSON.parse(localStorage.getItem('hinsightProfile')||'{}');
const history=JSON.parse(localStorage.getItem('hinsightHistory')||'{}');

// Insight strip — renders ABOVE greeting title
const weakMod=history.weakMod;
const modNames=['Module 5','Module 6','Module 7','Module 8'];
if(weakMod!==undefined){
  const slot=document.getElementById('insightSlot');
  slot.innerHTML='<div class="insight" style="margin-bottom:0"><div class="mod-badge">M'+(weakMod+5)+'</div><div class="insight-txt">'+modNames[weakMod]+' is still your biggest gap from your last paper.<span>Recommended papers are weighted towards '+modNames[weakMod]+'.</span></div></div>';
}

// Greeting — renders below insight
const greetTitle=document.getElementById('greetTitle');
if(profile.name){
  greetTitle.textContent='Welcome back, '+profile.name+'.';
}

// Recommended section — always visible
const recSection=document.getElementById('recSection');
recSection.style.display='block';
if(weakMod!==undefined){
  document.getElementById('recSub').textContent='Based on your '+modNames[weakMod]+' weakness';
  const sorted=[...PAPERS].filter(p=>!p.soon).sort((a,b)=>b.mods[weakMod]-a.mods[weakMod]).slice(0,3);
  document.getElementById('recGrid').innerHTML=sorted.map(p=>paperCardSimple(p,history[p.id])).join('');
} else {
  document.getElementById('recSub').textContent='Most popular to start with';
  const defaults=PAPERS.filter(p=>!p.soon).slice(0,3);
  document.getElementById('recGrid').innerHTML=defaults.map(p=>paperCardSimple(p,null)).join('');
}

// Top 10 — duplicated for seamless infinite scroll
const t10html=TOP10.map((t,i)=>t10Card(t,i)).join('');
document.getElementById('top10Grid').innerHTML=t10html+t10html;

// All papers
const reviewed=Object.keys(history).filter(k=>k!=='weakMod');
document.getElementById('allSub').textContent=PAPERS.filter(p=>!p.soon).length+' papers · Chemistry Year 12';
document.getElementById('allGrid').innerHTML=PAPERS.map(p=>paperCardSimple(p,history[p.id])).join('');
</script>
</body>
</html>
