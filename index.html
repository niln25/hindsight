(function(){
  const items=s1.querySelectorAll('.ticker-item');
  let ci=0;
  items[ci].style.transition='none';
  items[ci].classList.add('t-on');
  void items[ci].offsetHeight;
  items[ci].style.transition='';
  function rotateTicker(){
    const prev=ci;
    items[prev].classList.remove('t-on');
    items[prev].classList.add('t-prev');
    ci=(ci+1)%items.length;
    items[ci].style.transition='none';
    items[ci].classList.remove('t-prev');
    void items[ci].offsetHeight;
    items[ci].style.transition='';
    items[ci].classList.add('t-on');
    setTimeout(()=>{
      items[prev].style.transition='none';
      items[prev].classList.remove('t-prev');
      void items[prev].offsetHeight;
      items[prev].style.transition='';
    },460);
  }
  setInterval(rotateTicker,3500);
})();

/* ── HOME live preview animation ── */
(function(){
  const TOT=28;
  const PV_MODS=[{n:'Module 5',p:88,c:'#2D5016'},{n:'Module 6',p:51,c:'#a96a12'},{n:'Module 7',p:79,c:'#2D5016'},{n:'Module 8',p:43,c:'#9a3520'}];
  const tiles=s1.querySelector('#pvTiles'),count=s1.querySelector('#pvCount'),mods=s1.querySelector('#pvMods');
  const scoreEl=s1.querySelector('#pvScore'),prioT=s1.querySelector('#pvPrioT'),prioB=s1.querySelector('#pvPrioB');
  mods.innerHTML=PV_MODS.map(m=>`<div class="pv-mc" style="border-left-color:${m.c}"><div class="mn">${m.n}</div><div class="mp" style="color:${m.c}">${m.p}%</div><div class="pvbar"><i data-w="${m.p}" style="background:${m.c}"></i></div></div>`).join('');
  const tileEls=[];
  for(let i=0;i<TOT;i++){const t=document.createElement('span');t.className='pv-tile';tiles.appendChild(t);tileEls.push(t);}

  function typewrite(el,txt,speed,done){
    el.textContent='';const cur=document.createElement('span');cur.className='pv-cursor';
    const tn=document.createTextNode('');el.appendChild(tn);el.appendChild(cur);let i=0;
    (function step(){if(i<=txt.length){tn.textContent=txt.slice(0,i++);setTimeout(step,speed);}else{cur.remove();done&&done();}})();
  }

  function run(){
    let t0=null;const dur=850;
    (function tick(ts){if(!t0)t0=ts;const k=Math.min(1,(ts-t0)/dur);scoreEl.textContent=Math.round(72*(1-Math.pow(1-k,3)));if(k<1)requestAnimationFrame(tick);})(performance.now());
    tileEls.forEach((t,i)=>setTimeout(()=>{t.classList.add('drop');count.textContent=i+1;},700+i*42));
    const dropsEnd=700+TOT*42;
    setTimeout(()=>mods.querySelectorAll('.pvbar>i').forEach((b,i)=>setTimeout(()=>b.style.width=b.dataset.w+'%',i*120)),1100);
    setTimeout(()=>typewrite(prioT,'Module 6 — Acid/Base Reactions',26,()=>typewrite(prioB,'14 marks left on the table. Revisit buffer calculations and pH concepts before your next paper.',15)),dropsEnd+200);
  }
  setTimeout(run,260);
})();

/* ── SECTION I — MCQ ── */

s2.innerHTML=`
<div class="s-head">
  <h2 class="h-serif" style="font-size:29px;margin:0">Section I — Multiple choice</h2>

</div>

<div class="mcq-outer"><div class="mcq-grid" id="mcqGrid"></div></div>

MCQ.forEach(q=>{const c=document.createElement('div');c.className='mcq-cell';
const col=mc(q.mod);
c.innerHTML=`<div class="top"><span class="qn">Q${q.n}</span><span class="modtag" style="background:${col.bg};color:${col.text}">${MOD[q.mod].n.replace('Module','Mod')}</span></div><div class="opts" data-q="${q.n}">${['A','B','C','D'].map(o=>`<button class="opt" data-o="${o}">${o}</button>`).join('')}</div>`;
grid.appendChild(c);});
function mcqProg(){p2.style.width=(Object.keys(state.mcq).length/20*100)+'%';}
grid.onclick=e=>{const b=e.target.closest('.opt');if(!b)return;const wrap=b.parentElement;state.mcq[+wrap.dataset.q]=b.dataset.o;[...wrap.children].forEach(x=>x.classList.toggle('sel',x===b));mcqProg();};
s2.querySelector('#auto2').onclick=()=>{MCQ.forEach(q=>{const giv=SAMPLE_MCQ[q.n]||q.correct;state.mcq[q.n]=giv;const wrap=grid.querySelector(`[data-q="${q.n}"]`);[...wrap.children].forEach(x=>x.classList.toggle('sel',x.dataset.o===giv));});mcqProg();};

/* ── SECTION II — MARKING ── */
const s3=document.createElement('section');s3.id='s3';s3.className='scr';
s3.style.padding='24px 28px 24px';
s3.innerHTML=`
<div class="s-head">
  <h2 class="h-serif" style="font-size:26px;margin:0">Section II — Short & extended response</h2>
  <span style="font-size:13px;color:var(--mut)">14 questions · 80 marks</span>
</div>
<div style="font-size:13.5px;color:var(--mut);margin-top:3px"><b style="color:var(--g);font-weight:600">Full</b> = correct &nbsp;·&nbsp; <b style="color:var(--amber);font-weight:600">Partial</b> = part marks &nbsp;·&nbsp; <b style="color:var(--red);font-weight:600">Zero</b> = 0. Add a reason only when you slipped.</div>
<div class="prog"><i id="p3"></i></div>
<div class="sec-outer">
  <div class="sec-wrap">
    <table class="sec-table">
      <colgroup><col class="c-q"><col class="c-m"><col class="c-k"><col class="c-a"></colgroup>
      <thead><tr><th>Question</th><th>Module</th><th style="text-align:center">Marks</th><th>Mark it</th></tr></thead>
      <tbody id="secBody"></tbody>
    </table>
  </div>
</div>
<div class="foot">
  <button class="link" id="auto3">Demo: autofill a sample attempt</button>
  <button class="btn primary" id="go3" style="padding:11px 22px;font-size:15px">See my diagnostic</button>
</div>`;
app.appendChild(s3);
const body=s3.querySelector('#secBody'),p3=s3.querySelector('#p3');
SEC.forEach(q=>{const tr=document.createElement('tr');tr.dataset.id=q.id;
const col=mc(q.mod);
tr.innerHTML=`<td class="qcell"><span class="ql">Q${q.id}</span><span class="qt">${q.t}</span></td>
<td><span class="modtag" style="background:${col.bg};color:${col.text}">${MOD[q.mod].n.replace('Module','Mod')}</span></td>
<td style="text-align:center;color:var(--mut);font-size:13.5px">${q.marks}</td>
<td><div style="display:flex;align-items:center;flex-wrap:wrap">
<div class="gpm" data-id="${q.id}"><button data-m="full">Full</button><button data-m="partial">Partial</button><button data-m="zero">Zero</button></div>
<input class="pin" type="number" min="0" max="${q.marks}" placeholder="?" style="display:none" data-pin="${q.id}"><span style="font-size:12px;color:var(--mut);display:none;margin-left:5px" data-of="${q.id}">/ ${q.marks}</span>
</div><select class="errsel" data-err="${q.id}" style="display:none"><option value="">Why did you lose marks?</option>${ERRORS.map(e=>`<option>${e}</option>`).join('')}</select></td>`;
body.appendChild(tr);});
function secProg(){const n=Object.keys(state.sec).length;p3.style.width=(n/SEC.length*100)+'%';}
function setMode(id,mode){const q=SEC.find(s=>s.id===id);const tr=body.querySelector(`tr[data-id="${id}"]`);
const gpm=tr.querySelector('.gpm');[...gpm.children].forEach(b=>{b.className='';if(b.dataset.m===mode)b.className='on-'+mode[0];});
const pin=tr.querySelector('[data-pin]'),of=tr.querySelector('[data-of]'),sel=tr.querySelector('[data-err]');
pin.style.display=of.style.display=(mode==='partial')?'inline-block':'none';
sel.style.display=(mode==='partial'||mode==='zero')?'inline-block':'none';
state.sec[id]={mode,val:mode==='full'?q.marks:mode==='zero'?0:(+pin.value||0),err:sel.value};
if(mode==='partial'&&pin.value==='')pin.focus();secProg();}
body.onclick=e=>{const b=e.target.closest('.gpm button');if(!b)return;setMode(+b.parentElement.dataset.id,b.dataset.m);};
body.addEventListener('input',e=>{const id=e.target.dataset.pin?+e.target.dataset.pin:e.target.dataset.err?+e.target.dataset.err:null;if(!id||!state.sec[id])return;
if(e.target.dataset.pin){let v=Math.max(0,Math.min(SEC.find(s=>s.id===id).marks,+e.target.value||0));state.sec[id].val=v;}
if(e.target.dataset.err)state.sec[id].err=e.target.value;});
s3.querySelector('#auto3').onclick=()=>{Object.entries(SAMPLE_SEC).forEach(([id,v])=>{id=+id;setMode(id,v[0]);const tr=body.querySelector(`tr[data-id="${id}"]`);if(v[0]==='partial'){const pin=tr.querySelector('[data-pin]');pin.value=v[1];state.sec[id].val=v[1];}if(v[2]){const sel=tr.querySelector('[data-err]');sel.value=v[2];state.sec[id].err=v[2];}});secProg();};
s3.querySelector('#go3').onclick=()=>{
  s4.innerHTML='<div class="diag-loading"><div class="hs-spin"></div><div class="spin-label">Analysing your result…</div></div>';
  show('s4',3);
  setTimeout(()=>buildDiag(),2500);
};

/* ── RESULTS / DIAGNOSTIC ── */
const s4=document.createElement('section');s4.id='s4';s4.className='scr';s4.style.overflowY='auto';app.appendChild(s4);

function buildDiag(){
const mods={};Object.keys(MOD).forEach(m=>mods[m]={earned:0,total:0});
MCQ.forEach(q=>{mods[q.mod].total+=1;if(state.mcq[q.n]===q.correct)mods[q.mod].earned+=1;});
SEC.forEach(q=>{mods[q.mod].total+=q.marks;const r=state.sec[q.id];if(r)mods[q.mod].earned+=r.val;});
let earned=0;Object.values(mods).forEach(m=>{earned+=m.earned;});earned=Math.round(earned);
const lost=Object.keys(mods).map(m=>({m,lost:mods[m].total-mods[m].earned,...mods[m]})).sort((a,b)=>b.lost-a.lost);
const worst=lost[0];
const errAgg={};SEC.forEach(q=>{const r=state.sec[q.id];if(r&&(r.mode==='partial'||r.mode==='zero')&&r.err){const l=q.marks-r.val;if(!errAgg[r.err])errAgg[r.err]={lost:0,c:0};errAgg[r.err].lost+=l;errAgg[r.err].c++;}});
const errSorted=Object.entries(errAgg).sort((a,b)=>b[1].lost-a[1].lost);
const maxErr=errSorted.length?errSorted[0][1].lost:1;
function domErr(m){const e={};SEC.filter(q=>q.mod===m).forEach(q=>{const r=state.sec[q.id];if(r&&r.err){const l=q.marks-r.val;e[r.err]=(e[r.err]||0)+l;}});const s=Object.entries(e).sort((a,b)=>b[1]-a[1]);return s.length?s[0][0]:null;}
const prios=lost.filter(x=>x.lost>0).slice(0,3).map(x=>{const de=domErr(x.m);return{mod:x.m,lost:x.lost,err:de,action:de?ACTION[de]:`Revisit the ${MOD[x.m].full} theory (textbook + Atomi), then redo the questions you missed under timed conditions.`};});
function pct(m){return mods[m].total?Math.round(mods[m].earned/mods[m].total*100):0;}
function band(p){return p>=70?['Strong','var(--g)']:p>=55?['Below target','var(--amber)']:['Needs work','var(--red)'];}
const sentence=worst.lost<=0
  ?`Clean sweep — <b>${earned}/100</b>. Lock in what's working and keep the run going.`
  :`<b>${MOD[worst.m].n}</b> is your biggest opportunity — <b>${worst.lost} Marks</b> are recoverable here, and fixing this module will move your score more than anything else.`;
const today=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'});
s4.innerHTML=`
<div class="receipt">James Ruse 2024 Chemistry — reviewed ${today}</div>
<div class="scorewrap"><div class="score" id="scoreNum">0<small>/100</small></div><div class="psent">${sentence}</div></div>
<div class="sub-h">📊 Module breakdown</div>
<div class="mod-grid">${Object.keys(MOD).map(m=>{const p=pct(m);const b=band(p);const col=mc(m);return `<div class="mod-card" style="border-left:3px solid ${col.text}"><div class="mn">${MOD[m].n}</div><div class="ms">${MOD[m].full}</div><div class="row"><span class="pct" style="color:${col.text}">${p}%</span><span class="lab" style="background:${b[1]}">${b[0]}</span></div><div style="font-size:12.5px;color:var(--mut);margin-top:5px">${Math.round(mods[m].earned)} / ${mods[m].total} Marks</div><div class="bar"><i data-w="${p}" style="background:${col.text}"></i></div></div>`;}).join('')}</div>
<div class="sub-h">⚠️ Error pattern — where your marks actually went</div>
${errSorted.length
  ?`<div>${errSorted.slice(0,5).map(([e,v])=>`<div class="err-row"><span class="nm">${e}</span><span class="eb"><i data-w="${Math.round(v.lost/maxErr*100)}"></i></span><span class="ev">${v.lost} Marks · ${v.c} Qs</span></div>`).join('')}</div>`
  :`<div style="font-size:15px;color:var(--mut)">No recurring error pattern — strong execution across Section II.</div>`}
<div class="sub-h">🎯 Top 3 priorities before your next paper</div>
${prios.length
  ?prios.map((p,i)=>{const col=mc(p.mod);return `<div class="prio">
<div class="num">${i+1}</div>
<div style="flex:1">
  <div class="pt">${MOD[p.mod].n} — ${MOD[p.mod].full}</div>
  <div style="display:flex;gap:7px;margin:6px 0 5px;flex-wrap:wrap">
    <span class="modtag" style="background:${col.bg};color:${col.text}">${MOD[p.mod].n}</span>
    ${p.err?`<span class="modtag" style="background:var(--amber50);color:var(--amber)">${p.err}</span>`:''}
  </div>
  <div class="pm"><b style="color:var(--ink);font-weight:600">${p.lost} Marks</b> left on the table</div>
  <div class="bar" style="margin:6px 0 8px"><i data-w="${pct(p.mod)}" style="background:${col.text}"></i></div>
  <div class="pa">${p.action}</div>
</div>
</div>`;}).join('')
  :`<div style="font-size:15px;color:var(--mut)">Nothing urgent — keep doing timed papers to stay sharp.</div>`}
${errSorted.length?`<div class="sub-h">✅ Your action plan</div><div class="action-grid">${errSorted.map(([e,v])=>`<div class="action-card"><div class="action-emoji">${EMOJI_MAP[e]||'📌'}</div><div style="flex:1"><div class="action-title">${e}<span class="action-mark-tag">${v.lost} Mark${v.lost!==1?'s':''} · ${v.c}Q</span></div><div class="action-text">${ACTION[e]||''}</div></div></div>`).join('')}</div>`:''}
<div class="sub-h">📄 Try these next</div>
<div class="rec-insight">${worst.lost>0?MOD[worst.m].n+' is your weakest module — these papers are weighted there.':'Strong result — these papers will push your consistency further.'}</div>
<div class="rec-row">
  <div class="rec-card">
    <div class="rec-title">Sydney Boys 2024</div>
    <div class="rec-body">40% Module 6 questions — targeted exposure on your weakest area. The mark allocation mirrors exactly what you need to rebuild.</div>
  </div>
  <div class="rec-card">
    <div class="rec-title">North Sydney Girls 2023</div>
    <div class="rec-body">6 extended-response questions across Modules 7 & 8. Trains the multi-part structure that cost you marks here.</div>
  </div>
</div>
<div class="soon">More subjects coming soon</div>`;
requestAnimationFrame(()=>{
let t0=null;const dur=900;const el=s4.querySelector('#scoreNum');
function tick(ts){if(!t0)t0=ts;const k=Math.min(1,(ts-t0)/dur);const v=Math.round(earned*(1-Math.pow(1-k,3)));el.innerHTML=v+'<small>/100</small>';if(k<1)requestAnimationFrame(tick);}
requestAnimationFrame(tick);
setTimeout(()=>{s4.querySelectorAll('.bar>i,.eb>i').forEach(b=>{b.style.width=b.dataset.w+'%';});},120);
});
}
})();
</script>
