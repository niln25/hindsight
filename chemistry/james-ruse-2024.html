<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindsight — James Ruse 2024 Chemistry Trial</title>
<style>html,body{margin:0;padding:0;height:100%}</style>
<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/dm-serif-display@5.0.19/index.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.0.19/400.css');
@import url('https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.0.19/500.css');
.hs-app{--g:#2D5016;--g7:#3d6a22;--g50:#eef3e8;--ink:#1d211a;--mut:#74796d;--ln:#e6e3d8;--paper:#faf9f5;--card:#fff;--amber:#a96a12;--amber50:#f7eedb;--red:#9a3520;--red50:#f7e9e4;font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);background:var(--paper);border:0.5px solid var(--ln);border-radius:16px;overflow:hidden;line-height:1.55;height:100vh;display:flex;flex-direction:column}
.hs-app *{box-sizing:border-box}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.hs-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:0.5px solid var(--ln);background:var(--card);flex-shrink:0}
.hs-wm{font-family:'DM Serif Display',Georgia,serif;font-size:23px;color:var(--g);letter-spacing:-.01em}
.hs-nav-right{display:flex;align-items:center;gap:10px}
.step-lbl{font-size:14px;color:var(--ink);font-weight:600}
.step{display:flex;align-items:center;gap:7px}
.dot{height:8px;width:8px;border-radius:20px;background:transparent;border:1.4px solid #c8ccc0;transition:all .35s}
.dot.done{background:var(--g);border-color:var(--g)}
.dot.active{width:26px;background:var(--g);border-color:var(--g)}
#screens{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.scr{display:none;padding:28px 32px 22px;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.scr.on{display:flex;animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h-serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400;letter-spacing:-.01em;line-height:1.12}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;padding:5px 13px;border-radius:20px;background:var(--g50);color:var(--g);font-weight:500;align-self:flex-start}
.modtag{font-size:12px;font-weight:500;padding:2px 8px;border-radius:5px;background:var(--g50);color:var(--g7);white-space:nowrap}
.btn{font-family:inherit;font-size:15px;font-weight:500;border:0.5px solid var(--ln);background:var(--card);color:var(--ink);padding:9px 16px;border-radius:9px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--g50);border-color:#cfd6c4}
.btn.primary{background:var(--g);color:#fff;border-color:var(--g);padding:13px 26px;font-size:16px}
.btn.primary:hover{background:var(--g7)}
.link{background:none;border:none;color:var(--mut);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:0}
.link:hover{color:var(--g)}
.s-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-shrink:0}
.prog{height:3px;background:#eceadf;border-radius:3px;margin:12px 0 10px;overflow:hidden;flex-shrink:0}
.prog>i{display:block;height:100%;width:0;background:var(--g);border-radius:3px;transition:width .35s ease}

/* ── HOME SCREEN ── */
.prof-row{display:flex;gap:6px;align-items:stretch;}
.prof-seg{transition:flex 0.3s ease;border-radius:9px;overflow:hidden;height:40px;}
.prof-seg.active{flex:5;background:var(--card);border:0.5px solid #9ab88a;display:flex;align-items:center;padding:0 12px;gap:6px;}
.prof-seg.done{flex:1;background:#e8e4d8;cursor:pointer;min-width:20px;}
.prof-seg.pending{flex:1;background:var(--ln);opacity:0.5;min-width:20px;}
.prof-seg input{border:none;background:transparent;outline:none;font-size:14px;color:var(--ink);font-family:inherit;width:100%;}
.prof-seg input::placeholder{color:var(--mut);opacity:0.7;}
.prof-enter{font-size:13px;color:var(--mut);opacity:0.25;transition:opacity .15s;flex-shrink:0;pointer-events:none;}
.prof-lbl{font-size:13px;color:var(--mut);margin-bottom:7px;}
.ticker-wrap{position:relative;height:28px;overflow:hidden;margin-top:4px}
.ticker-item{position:absolute;top:0;width:100%;font-size:17px;color:var(--ink);display:flex;align-items:center;gap:9px;line-height:1.55;transform:translateY(100%);transition:transform .42s cubic-bezier(.4,0,.2,1);font-weight:400}
.ticker-item.t-on{transform:translateY(0)}
.ticker-item.t-prev{transform:translateY(-100%)}

/* ── MCQ (Section I) — 4 cols, centred block ── */
.mcq-outer{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0}
.mcq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;width:100%;max-width:1220px;margin:0 auto;padding:14px 0}
.mcq-cell{border:0.5px solid var(--ln);border-radius:10px;padding:22px 12px;background:var(--card);display:flex;flex-direction:column;justify-content:center}
.mcq-cell .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mcq-cell .qn{font-size:13.5px;font-weight:500}
.opts{display:flex;gap:4px}
.opt{flex:1;font-family:inherit;font-size:13px;font-weight:500;border:0.5px solid var(--ln);background:#fff;color:var(--mut);border-radius:6px;padding:6px 0;cursor:pointer;transition:all .12s}
.opt:hover{border-color:var(--g);color:var(--g)}
.opt.sel{background:var(--g);border-color:var(--g);color:#fff}
.opt.wrong{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.opt.correct-ans{background:var(--g50);border-color:var(--g);color:var(--g);font-weight:700;position:relative}
.opt.correct-ans::after{content:"✓";font-size:9px;position:absolute;top:2px;right:3px;opacity:0.7}

/* ── Section II — centred, compact ── */
.sec-outer{flex:1;min-height:0;overflow-y:auto;width:100%;display:flex;flex-direction:column}
.sec-wrap{width:100%;max-width:1060px;margin:auto}
.sec-table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13.5px}
.sec-table col.c-q{width:34%}.sec-table col.c-m{width:12%}.sec-table col.c-v{width:11%}.sec-table col.c-k{width:7%}.sec-table col.c-a{width:36%}
.sec-table th{text-align:left;font-weight:600;color:var(--ink);font-size:13.5px;padding:0 8px 10px;border-bottom:0.5px solid var(--ln)}
.sec-table td{padding:11px 6px;border-bottom:0.5px solid var(--ln);vertical-align:middle}
.qcell .ql{font-weight:500;font-size:13.5px;display:inline}
.qcell .qt{font-size:11.5px;color:var(--mut);margin-left:6px;display:inline}
.gpm{display:inline-flex;border:0.5px solid var(--ln);border-radius:8px;overflow:hidden}
.gpm button{font-family:inherit;font-size:12px;font-weight:500;border:none;background:#fff;color:var(--mut);padding:5px 8px;cursor:pointer;border-right:0.5px solid var(--ln);transition:all .12s}
.gpm button:last-child{border-right:none}
.gpm button:hover{background:#f3f5ee}
.gpm button.on-f{background:var(--g);color:#fff}
.gpm button.on-p{background:var(--amber);color:#fff}
.gpm button.on-z{background:var(--red);color:#fff}
.pin{width:44px;font-family:inherit;font-size:13px;text-align:center;border:0.5px solid var(--ln);border-radius:6px;padding:4px;margin-left:8px}
.errsel{font-family:inherit;font-size:12px;border:0.5px solid var(--ln);border-radius:6px;padding:5px 8px;color:var(--ink);background:#fff;width:100%;max-width:280px;margin-top:5px}
.foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:auto;padding-top:10px;flex-shrink:0}

/* ── Diagnostic ── */
.scorewrap{text-align:center;padding:6px 0 4px;flex-shrink:0}
.score{font-family:'DM Serif Display',Georgia,serif;font-size:72px;line-height:1;color:var(--g)}
.score small{font-size:29px;color:var(--mut)}
.psent{font-size:18px;color:var(--ink);max-width:580px;margin:14px auto 2px;line-height:1.5;font-weight:500}
.psent b{color:var(--g)}
.sub-h{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.06em;text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.sub-h::after{content:"";flex:1;height:0.5px;background:var(--ln)}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.mod-card{border:0.5px solid var(--ln);border-radius:11px;padding:13px 14px;background:var(--card);border-left-width:3px;transition:transform .2s,box-shadow .2s}
.mod-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.mod-card .mn{font-size:14px;font-weight:600}
.mod-card .ms{font-size:12px;color:var(--mut);margin:2px 0 10px}
.mod-card .row{display:flex;align-items:baseline;justify-content:space-between}
.mod-card .pct{font-size:24px;font-weight:600}
.mod-card .lab{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff}
.bar{height:6px;border-radius:6px;background:#eceadf;margin-top:10px;overflow:hidden}
.bar>i{display:block;height:100%;width:0;border-radius:6px;transition:width .9s ease}
.err-row{display:flex;align-items:center;gap:11px;margin-bottom:9px;font-size:14px}
.err-row .nm{width:250px;flex-shrink:0}
.err-row .eb{flex:1;height:8px;background:#eceadf;border-radius:8px;overflow:hidden}
.err-row .eb>i{display:block;height:100%;width:0;background:var(--amber);border-radius:8px;transition:width .9s ease}
.err-row .ev{font-size:12.5px;color:var(--mut);width:100px;text-align:right;flex-shrink:0}
.prio{display:flex;border:0.5px solid var(--ln);border-radius:11px;background:var(--card);margin-bottom:8px}
.prio-left{width:34%;flex-shrink:0;padding:11px 14px;border-right:0.5px solid var(--ln);display:flex;flex-direction:column;gap:3px}
.prio-top-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1px}
.prio-num{font-family:'DM Serif Display',Georgia,serif;font-size:42px;line-height:1}
.prio-emoji{font-size:18px;line-height:1;margin-top:3px}
.prio-err{font-size:12.5px;color:var(--mut);line-height:1.3}
.prio-marks{font-size:12.5px;color:var(--ink)}
.prio-marks b{font-weight:700}
.prio-right{flex:1;padding:12px 20px;display:flex;align-items:center}
.prio-action{font-size:14.5px;color:var(--ink);line-height:1.55}
.receipt{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;color:var(--g7);background:var(--g50);border-radius:9px;padding:8px 14px;margin-bottom:16px;font-weight:500;align-self:flex-start;flex-shrink:0}
.rec-insight{font-size:16.5px;font-weight:500;color:var(--ink);line-height:1.45;margin-bottom:14px}
.rec-row{display:flex;gap:13px}
.rec-card{border:0.5px solid var(--ln);border-radius:11px;padding:16px 17px;background:var(--card);flex:1;transition:background .22s,transform .2s,box-shadow .2s,border-color .2s}
.rec-card:hover{background:#1a2d4a;transform:translateY(-4px);box-shadow:0 8px 24px rgba(26,45,74,0.18);border-color:#1a2d4a}
.rec-card .rec-title{font-size:15.5px;font-weight:600;color:var(--ink);margin-bottom:7px;transition:color .22s}
.rec-card:hover .rec-title{color:#fff}
.rec-card .rec-body{font-size:14px;color:var(--mut);line-height:1.5;transition:color .22s}
.rec-card:hover .rec-body{color:#a8bdd4}
.soon{font-size:13.5px;color:var(--mut);margin-top:14px}
.diag-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px}
.hs-spin{width:22px;height:22px;border:2.5px solid var(--ln);border-top-color:var(--g);border-radius:50%;animation:hs-spin .75s linear infinite}
@keyframes hs-spin{to{transform:rotate(360deg)}}
.spin-label{font-size:14px;color:var(--mut)}
.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:4px}
.action-card{display:flex;gap:14px;border:0.5px solid var(--ln);border-radius:11px;padding:13px 15px;background:var(--card);align-items:flex-start}
.action-emoji{font-size:20px;line-height:1;flex-shrink:0;padding-top:3px}
.action-title{font-size:14.5px;font-weight:600;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.action-mark-tag{font-size:12px;color:var(--amber);font-weight:500}
.action-text{font-size:13.5px;color:var(--mut);line-height:1.45}

/* ── HOME two-column + live preview ── */
.home2{display:flex;gap:44px;flex:1;align-items:center;justify-content:center;width:100%;max-width:1180px;margin:0 auto;min-height:0}
.home-l{flex:1 1 0;max-width:540px}
.home-r{flex:0 0 452px;display:flex;align-items:center}
.preview{position:relative;width:100%;background:var(--card);border:0.5px solid var(--ln);border-radius:18px;padding:22px 22px 20px;box-shadow:0 10px 34px rgba(45,80,22,.07)}
.pv-tag{position:absolute;top:15px;right:17px;font-size:10.5px;color:#9aa093;letter-spacing:.07em;text-transform:uppercase;font-weight:600}
.pv-score{font-family:'DM Serif Display',Georgia,serif;font-size:56px;line-height:1;color:var(--g)}
.pv-score small{font-size:23px;color:var(--mut)}
.pv-sub{font-size:14.5px;color:var(--mut);line-height:1.45;margin:7px 0 0;max-width:330px}
.pv-sub b{color:var(--g);font-weight:600}
.pv-tray{margin:15px 0 4px;border:0.5px solid var(--ln);border-radius:11px;background:#fbfaf6;padding:10px 13px;display:flex;align-items:center;gap:12px}
.pv-tiles{display:flex;flex-wrap:wrap;gap:4px;flex:1;align-content:center;min-height:22px}
.pv-tile{width:9px;height:9px;border-radius:2.5px;background:var(--amber);opacity:0;transform:translateY(-46px) rotate(-12deg)}
.pv-tile.drop{animation:tiledrop .5s cubic-bezier(.34,1.4,.5,1) forwards}
@keyframes tiledrop{0%{opacity:0;transform:translateY(-46px) rotate(-12deg)}55%{opacity:1}100%{opacity:1;transform:translateY(0) rotate(0)}}
.pv-tray-lab{font-size:12.5px;color:var(--ink);font-weight:500;white-space:nowrap;flex-shrink:0}
.pv-tray-lab b{font-family:'DM Serif Display',Georgia,serif;color:var(--amber);font-size:18px;font-weight:400;margin-right:2px}
.pv-h{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.07em;text-transform:uppercase;margin:16px 0 9px}
.pv-mods{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pv-mc{border:0.5px solid var(--ln);border-radius:9px;padding:9px 11px;border-left-width:3px;border-left-style:solid}
.pv-mc .mn{font-size:12.5px;font-weight:600;color:var(--ink)}
.pv-mc .mp{font-family:'DM Serif Display',Georgia,serif;font-size:21px;line-height:1.1;margin-top:1px}
.pv-mc .pvbar{height:5px;border-radius:5px;background:#eceadf;margin-top:7px;overflow:hidden}
.pv-mc .pvbar>i{display:block;height:100%;width:0;border-radius:5px;transition:width .85s cubic-bezier(.4,0,.2,1)}
.pv-prio{display:flex;gap:12px;border:0.5px solid var(--ln);border-radius:10px;padding:11px 13px;background:#fbfaf6;align-items:flex-start;min-height:62px}
.pv-prio-num{font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:var(--g);line-height:1;flex-shrink:0;width:18px}
.pv-prio-t{font-size:13.5px;font-weight:600;color:var(--ink);min-height:17px}
.pv-prio-b{font-size:12.5px;color:var(--mut);line-height:1.4;margin-top:3px;min-height:16px}
.pv-cursor{display:inline-block;width:1px;height:13px;vertical-align:-2px;background:var(--g);margin-left:1px;animation:pvblink .7s steps(1) infinite}
@keyframes pvblink{50%{opacity:0}}
/* ── Priority card interactive (spotlight) ── */
.prio{cursor:pointer;transition:border-color .18s,box-shadow .18s,background .18s,transform .2s}
.prio:hover{border-color:#c4cbb9;transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,0.08)}
.prio.prio-active{border-color:var(--pc);box-shadow:0 0 0 2.5px var(--pc),0 6px 16px rgba(0,0,0,0.08);transform:translateY(-3px)}
.prio.prio-active .prio-left{border-right-color:var(--pc)}

/* ── Two-column priorities + question review panel ── */
.diag-prio-wrap{display:flex;gap:14px;align-items:flex-start}
.diag-prio-col{flex:1;min-width:0;display:flex;flex-direction:column}
.diag-prio-list{display:flex;flex-direction:column;gap:7px;flex:1}
.diag-prio-list .prio{margin-bottom:0;flex:1}
.diag-q-col{flex:1;min-width:0;display:flex;flex-direction:column}
.qpanel{height:480px;max-height:480px;overflow-y:auto;border:0.5px solid var(--ln);border-radius:11px;background:var(--card);scrollbar-width:thin;scrollbar-color:#d4d7cd transparent}
.qcard{border-bottom:0.5px solid var(--ln);transition:opacity .22s}
.qcard:last-child{border-bottom:none}
.qcard.q-dim{opacity:.18}
.qcard.q-lit{opacity:1}
.qhead{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;user-select:none;border-left:3px solid transparent;transition:background .12s,border-color .18s}
.qcard.q-lit .qhead{border-left-color:var(--pc)}
.qhead:hover{background:#f5f4ef}
.q-num{font-size:12.5px;font-weight:700;color:var(--ink);flex-shrink:0;width:36px}
.qcard.q-reviewed .q-num{text-decoration:line-through;text-decoration-color:var(--pc)}
.q-title{font-size:12.5px;color:var(--mut);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-score{font-size:12px;font-weight:700;flex-shrink:0}
.q-tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;max-width:118px;overflow:hidden;text-overflow:ellipsis}
.q-chev{font-size:9px;color:var(--mut);flex-shrink:0;transition:transform .22s}
.qcard.q-open .q-chev{transform:rotate(90deg)}
.qbody{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.qcard.q-open .qbody{max-height:560px}
.qinner{padding:11px 14px 13px 17px;border-top:0.5px solid var(--ln);background:#fbfaf6}
.q-errlabel{font-size:12px;font-weight:600;color:var(--red);margin-bottom:6px}
.q-fb{font-size:12.5px;color:var(--ink);line-height:1.5}
.q-review-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-family:inherit;font-size:11.5px;font-weight:500;color:var(--g);background:var(--g50);border:0.5px solid #c4cbb9;border-radius:20px;padding:4px 13px;cursor:pointer;transition:all .15s}
.q-review-btn:hover{background:var(--g);color:#fff;border-color:var(--g)}
.q-reviewed-txt{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:11.5px;font-weight:600;color:var(--g)}
.q-dp{margin-top:8px;display:block}
.q-dp-row{display:flex;align-items:baseline;gap:6px}
.q-dp-lbl{font-size:10.5px;font-weight:700;color:#d02d2d;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0}
.q-dp-short{font-size:12.5px;color:#d02d2d;font-weight:500;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(210,45,45,0.4)}
.q-dp-expand-btn{font-family:inherit;font-size:11.5px;color:#d02d2d;background:none;border:none;padding:0;cursor:pointer;text-decoration:underline;text-underline-offset:2px;flex-shrink:0;opacity:0.65}
.q-dp-expand-btn:hover{opacity:1}
.q-dp-full{margin-top:6px;padding:9px 11px;background:#fdf0f0;border-radius:7px;border-left:2px solid rgba(210,45,45,0.3);font-size:12px;color:#8b3030;line-height:1.6;display:none}
.q-dp-full.open{display:block}
.prio-other{cursor:pointer;border:0.5px solid #e8c97a;border-radius:11px;background:#fef6e4;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;transition:border-color .18s,box-shadow .18s,transform .2s}
.prio-other:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(169,106,18,0.1)}
.prio-other.prio-active{border-color:#c9922a;box-shadow:0 0 0 2.5px #c9922a,0 6px 16px rgba(169,106,18,0.12);transform:translateY(-3px)}
.qpanel::-webkit-scrollbar{width:5px}
.qpanel::-webkit-scrollbar-track{background:transparent}
.qpanel::-webkit-scrollbar-thumb{background:#d4d7cd;border-radius:4px}
.verb-card{display:flex;flex-direction:column;gap:9px;margin-top:2px}

const THEORY_FB = {
  '21||Did not know theory': 'This question required you to know the three categories of structural isomer and apply them to C₄H₈O₂ — specifically that butanoic acid has a chain isomer (2-methylpropanoic acid) and functional group isomers (esters such as methyl propanoate). You needed to recognise that isomers share the same molecular formula but differ in connectivity, and that carboxylic acids and esters are functional group isomers of each other. Go back to syllabus dot point 7.2 — structural isomers — and practise drawing chain, position and functional group isomers for a given molecular formula until you can list every valid structure.',

  '22||Did not know theory': 'This question required you to explain, in collision-theory terms, how a catalyst alters the rate curve. You needed to know that a catalyst provides an alternative reaction pathway with lower activation energy, so a greater proportion of collisions exceed Eₐ and are successful — giving a steeper initial gradient that reaches the same final yield. Go back to syllabus dot point 5.4 — collision theory and reaction rate — and link each rate factor to its effect on either collision frequency or the proportion of successful collisions before annotating rate graphs.',

  '23||Did not know theory': 'This question required you to state a specific reagent and observable result that confirms the functional group in butan-2-ol. You needed to know that acidified potassium dichromate oxidises a secondary alcohol, turning orange Cr₂O₇²⁻ to green Cr³⁺, and to state both the reagent and the colour change as the positive result. Go back to syllabus dot point 8.5 — qualitative tests for functional groups — and memorise the reagent, observation and which functional groups give a positive result for each test.',

  '24a||Did not know theory': 'This question required you to know the products of an acid–carbonate reaction and balance the equation. You needed to know that acid + carbonate produces a salt, water and carbon dioxide, giving Na₂CO₃ + 2HCl → 2NaCl + H₂O + CO₂, and to balance for the 2:1 acid-to-carbonate ratio. Go back to syllabus dot point 6.3 — predicting products of acid reactions — and rehearse the three general patterns (acid+base, acid+carbonate, acid+metal) until the products are automatic.',

  '24b||Did not know theory': 'This question required you to know the logic of a back titration, not just titration arithmetic. You needed to know that you titrate the unreacted excess acid, subtract those moles from the total acid added to find the moles that reacted with the sample, then convert to mass and divide by the original sample mass for percentage purity. Go back to syllabus dot point 6.13 — titration analysis — and work through back-titration problems specifically, tracking moles in excess versus moles reacted before attempting purity calculations.',

  '25a||Did not know theory': 'This question required you to justify why sodium bicarbonate, rather than a strong base, is used on acid spills. You needed to know that NaHCO₃ is a weak, safe base that neutralises acid without the corrosive hazards of a strong base, and that the visible CO₂ effervescence indicates when the reaction is occurring and ceasing. Go back to syllabus dot point 6.4 — applications of neutralisation — and link each everyday or industrial use to the specific chemical property that makes that substance suitable.',

  '25b||Did not know theory': 'This question required you to state two specific limitations of the Arrhenius model. You needed to know that Arrhenius only applies to aqueous solutions and defines a base as an OH⁻ producer, so it cannot explain the basicity of substances like ammonia that contain no hydroxide, nor acid–base behaviour in non-aqueous systems. Go back to syllabus dot point 6.6 — changing acid–base models — and compare Arrhenius against Brønsted–Lowry, listing exactly what each model can and cannot account for.',

  '26||Did not know theory': 'This question required you to apply Le Chatelier\'s principle to justify the Haber process operating conditions and their economic rationale. You needed to know that the forward reaction is exothermic and produces fewer gas moles, so high pressure and low temperature favour yield — but a moderate compromise temperature (~400–450°C) with an iron catalyst is used to reach an economically viable rate without shifting equilibrium. Go back to syllabus dot point 5.5 — Le Chatelier\'s principle — and practise explaining industrial conditions as a yield-versus-rate-versus-cost compromise, not yield alone.',

  '27a||Did not know theory': 'This question required you to account for the difference in combustion between octane and a biofuel such as ethanol. You needed to know that ethanol already contains oxygen in its structure, giving cleaner, more complete combustion but releasing less energy per gram than octane, whose pure hydrocarbon chain has higher energy density but is more prone to incomplete combustion. Go back to syllabus dot point 7.17 — comparing fuels and biofuels — and tabulate energy density, combustion completeness and renewability for fossil fuels versus biofuels.',

  '27b||Did not know theory': 'This question required you to connect the molar enthalpy of combustion to a temperature change via q = mcΔT. You needed to know that q is found from the moles of alcohol burned multiplied by its molar heat of combustion, and that ΔT is then obtained by rearranging to ΔT = q/(mc) using the mass and specific heat capacity of the water heated. Go back to syllabus dot point 7.13 — enthalpy of combustion of alcohols — and rehearse the full chain from moles burned to heat released to temperature rise before attempting calorimetry questions.',

  '28c||Did not know theory': 'This question required you to explain the solubility trend across the alcohol homologous series in terms of bonding. You needed to know that the polar hydroxyl group forms hydrogen bonds with water, but as the non-polar hydrocarbon chain lengthens it increasingly disrupts water–water hydrogen bonding, so solubility falls down the series — and your diagram needed to show hydrogen bonding between the –OH group and water. Go back to syllabus dot point 7.12 — bonding in the alcohol homologous series — and practise drawing the hydrogen-bonding interaction while explaining the competition between the hydrophilic head and hydrophobic tail.',

  '29a||Did not know theory': 'This question required you to deduce whether the reaction is exothermic or endothermic from how Keq changes with temperature. You needed to know that for an exothermic forward reaction, increasing temperature shifts equilibrium backwards and therefore decreases Keq, while an endothermic reaction shows the opposite trend — so the direction of the Keq-versus-T graph fixes the sign of ΔH. Go back to syllabus dot point 5.10 — effect of temperature on Keq — and practise reasoning from a Keq trend to the thermicity of the reaction using Le Chatelier.',

  '29b||Did not know theory': 'This question required you to set up and solve an ICE table to find an equilibrium concentration, not just plug into a formula. You needed to know how to write the correct Keq expression for the reaction, populate the change row with a single variable based on the stoichiometry, and substitute the equilibrium expressions into Keq to solve for x and hence [H₂]. Go back to syllabus dot point 5.9 — Keq calculations — and drill ICE-table setup across several reaction stoichiometries until the change-row signs and coefficients are automatic.',

  '30a||Did not know theory': 'This question required you to recognise that adding solid copper has no effect on the equilibrium position. You needed to know that pure solids and liquids are excluded from the equilibrium expression because their concentration is effectively constant, so increasing the amount of solid Cu cannot shift a heterogeneous equilibrium. Go back to syllabus dot point 5.5 — Le Chatelier\'s principle — and focus specifically on heterogeneous equilibria, noting which species are omitted from the reaction quotient and why.',

  '30b||Did not know theory': 'This question required you to account for the equilibrium shift caused by dilution. You needed to know that adding water lowers the concentration of all dissolved species, and that the system responds by shifting toward the side with the greater number of dissolved (aqueous) particles to partially restore concentration. Go back to syllabus dot point 5.5 — Le Chatelier\'s principle — and practise the dilution case specifically, comparing moles of dissolved species on each side to predict the shift direction.',

  '31||Did not know theory': 'This question required you to derive the Ksp expression for a 1:2 salt and calculate solubility. You needed to know that Pb(SCN)₂ dissolves to give one Pb²⁺ and two SCN⁻, so Ksp = [Pb²⁺][SCN⁻]² = (s)(2s)² = 4s³, and that the thiocyanate concentration is twice the molar solubility. Go back to syllabus dot point 5.16 — Ksp and solubility — and work through dissolution expressions for 1:1, 1:2 and 1:3 salts so the coefficient powers and the factor on solubility become automatic.',

  '32a||Did not know theory': 'This question required you to identify unknown organic compounds by reasoning through a reaction pathway. You needed to know the standard functional group transformations — such as hydration of alkenes to alcohols and oxidation of alcohols to carboxylic acids — and to use the reagents at each step as evidence for each compound\'s identity. Go back to syllabus dot point 7.23 — reaction pathways and flow charts — and build a master organic conversion map (reagents and conditions for each arrow) so you can read identities off a sequence of steps.',

  '32b||Did not know theory': 'This question required you to write the structural equation for the hydration (addition of water) of hex-3-ene. You needed to know that water adds across the carbon–carbon double bond, with –H and –OH adding to the two double-bond carbons to give hexan-3-ol, and to draw full structural formulae showing the broken double bond. Go back to syllabus dot point 7.9 — addition reactions of unsaturated hydrocarbons — and practise drawing structural equations for the addition of H₂, X₂, HX and H₂O across a double bond.',

  '33a||Did not know theory': 'This question required you to calculate the concentration of HOCl from titration data using stoichiometry. You needed to know how to find moles of titrant from its concentration and volume, apply the mole ratio from the balanced equation to find moles of HOCl, then divide by the HOCl sample volume to obtain its concentration. Go back to syllabus dot point 6.13 — titration analysis — and rehearse the moles → ratio → concentration sequence so each step follows directly from the balanced equation.',

  '33b||Did not know theory': 'This question required you to calculate the pH within the buffer region of a weak acid system. You needed to know that a buffer resists pH change and that pH = pKa + log([conjugate base]/[weak acid]), then substitute the concentrations of the conjugate acid–base pair present at that point. Go back to syllabus dot point 6.19 — preparing and analysing buffers — and practise identifying when a system is buffering and applying the Henderson–Hasselbalch relationship to find pH.',

  '33d||Did not know theory': 'This question required you to reason about how a specific systematic error propagates through the titration result. You needed to know that an unintentionally diluted NaOH has a lower true concentration than assumed, so a larger volume is needed to reach the endpoint, systematically skewing the calculated analyte concentration in one consistent direction rather than randomly. Go back to syllabus dot point 6.13 — titration analysis — and practise tracing how each systematic error (diluted reagent, wet flask, wrong indicator) affects the titre and the final calculated value.',

  '34||Did not know theory': 'This question required you to integrate data from multiple spectroscopic techniques to justify three structures. You needed to know how to read ¹H and ¹³C NMR for the number of chemical environments and splitting, mass spectrometry for molecular mass and fragment losses, and IR for characteristic functional-group absorptions, then combine them as converging evidence for each structure. Go back to syllabus dot point 8.6 — spectroscopic analysis — and practise interpreting NMR, MS and IR together on the same molecule rather than each technique in isolation.',

  '35||Did not know theory': 'This question required you to work through a multi-step precipitation titration to determine an analyte in a commercial disinfectant. You needed to know the precipitation-titration method — how the titrant reacts with the analyte in a defined mole ratio, and how to carry moles through each stage of a multi-step analysis to the final concentration. Go back to syllabus dot point 8.3 — gravimetric and precipitation titration analysis — and practise sequencing multi-step mole calculations, checking the mole ratio at every stage.'
}

    nesa: 'Relate cause and effect. Make the relationships between things evident. Provide why and/or how.',
    commonMistake: 'Describing what happened without connecting cause and effect. A list of facts is not an explanation.',
    inPractice: 'Your answer needs a "because," "therefore," "as a result," or "hence." If it doesn\'t, you\'re describing, not explaining. Scaffold: write CAUSE and EFFECT as two subheadings before you start — fill both, then connect them with the mechanism. Don\'t skip steps; jump on every stone in the chain. Green flags: "because," "as a result," "hence," "which causes," "therefore."'
  },

  'Justify': {
    nesa: 'Support an argument or conclusion.',
    commonMistake: 'Stating a position without evidence, or listing evidence without explicitly linking it back to the claim.',
    inPractice: 'Always use evidence. Structure: claim → specific evidence → re-link the evidence to the claim. The link is non-negotiable — don\'t leave the marker to make the connection themselves. Every piece of evidence must explicitly support the conclusion stated in the question.'
  },

  'Evaluate': {
    nesa: 'Make a judgement based on criteria; determine the value of.',
    commonMistake: 'Listing pros and cons but never committing to a final judgement, or arguing one side only.',
    inPractice: 'Mental trigger: PROS + CONS + JUDGEMENT. Before writing, consider designing your own criteria based on what the question is asking — write them down first, then use them as the lens for your pros and cons and judgement. The judgement is your reasoned opinion stated directly — pros outweigh cons, or a limitation is significant enough to change the verdict. Commit to it and link back to the question. Green flag words: "effectively," "significantly," "is not sufficient because," "outweighs," "on balance."'
  },

  'Assess': {
    nesa: 'Make a judgement of value, quality, outcomes, results or size.',
    commonMistake: 'Providing evidence or content without stating a clear verdict — the judgement must be explicit, not implied by what you\'ve written.',
    inPractice: 'Mental trigger: PROS + CONS + JUDGEMENT. Same structure as evaluate. End with a direct committed statement: "Overall, X is [effective / significant / appropriate / limited] because..." Vague conclusions lose the mark even if the content is correct.'
  },

  'Analyse': {
    nesa: 'Identify components and the relationship between them; draw out and relate implications.',
    commonMistake: 'Naming or describing components without explaining how they relate to each other or what the relationship implies.',
    inPractice: 'Break it into parts — subheadings can help when there are distinct components in the stimulus. Then relate between those parts. For every component ask: what is it, how does it connect to the others, and what does that connection imply? Naming components alone is describe. If there\'s no implication drawn, you haven\'t analysed.'
  },

  'Compare': {
    nesa: 'Show how things are similar or different.',
    commonMistake: 'Describing X, then describing Y separately — leaving the marker to do the comparison themselves.',
    inPractice: 'Both similarities and differences are expected unless the question specifies otherwise. Every point must be a directly paired statement: "[property of X] whereas [property of Y]." Green flag words: "whereas," "both," "unlike," "in contrast," "similarly." For longer questions, a table helps: draw a 3×3 grid with the top-left cell empty, column headings as the two things being compared (X and Y), and row headings as the features. Fill each cell. If a table gets clunky, use Similarities and Differences as subheadings instead.'
  },

  'Distinguish': {
    nesa: 'Recognise or note/indicate as being distinct or different from; to note differences between.',
    commonMistake: 'Including similarities — distinguish means differences only.',
    inPractice: 'JUST the differences. If you\'re writing a similarity, delete it. One clear paired difference per mark. Green flag words: "in contrast," "whereas," "on the other hand." If your answer could also be the answer to a compare question, you\'ve probably included things you shouldn\'t have.'
  },

  'Outline': {
    nesa: 'Sketch in general terms; indicate the main features of.',
    commonMistake: 'Writing a full explanation with causes, mechanisms, and detail the question didn\'t ask for.',
    inPractice: 'One concise point per mark, no "because" or "therefore." If the question is about an experiment or method, write it as numbered steps — 1. 2. 3. — stating only what happens at each step, not why it works. If you\'re explaining, you\'re over-answering.'
  },

  'Discuss': {
    nesa: 'Identify issues and provide points for and/or against.',
    commonMistake: 'Arguing only one side, or adding a final judgement — discuss does NOT require one.',
    inPractice: 'Mental trigger: PROS AND CONS. Both are required. No judgement needed — just lay out both sides clearly. Split the page or use subheadings (Pros / Cons). The mark allocation is your guide: roughly one substantive point per mark, split across both sides.'
  },

  'Calculate': {
    nesa: 'Ascertain/determine from given facts, figures or information.',
    commonMistake: 'Writing only the final answer without showing working, or dropping units from values mid-calculation.',
    inPractice: 'Write the formula first, then the substituted version with every value and its unit. Every digit that has a unit must have that unit written next to it — no exceptions. Show every step on its own line, don\'t skip. State your final answer with correct units and significant figures. Marks are allocated per step — clear working means you can still earn most of the marks even if the final answer is wrong.'
  },

  'Determine': {
    nesa: 'Establish, conclude or ascertain.',
    commonMistake: 'Showing the method or setting up the working without reaching a definite final answer — an unfinished method leaves marks on the table even if the setup is correct.',
    inPractice: 'Your answer must end with a specific value, name, or conclusion. Write every step of working and state the result explicitly at the end. Green flag: a clearly stated final answer with correct units.'
  },
  'Account': {
    nesa: 'State reasons for, report on.',
    commonMistake: 'Narrating what happened in sequence instead of giving the reasons behind it.',
    inPractice: 'Start with "This occurs because..." and give the specific chemical reason — intermolecular forces, equilibrium shift, reaction mechanism, bonding. If you\'re describing a sequence of events rather than explaining what drives them, you\'ve missed the verb.'
  },

  'Predict': {
    nesa: 'Suggest what may happen based on available information.',
    commonMistake: 'Stating a prediction without referencing the specific data or theory from the question that supports it.',
    inPractice: 'Prediction first, then the evidence. "X will occur because [specific data or principle from the question] indicates [Y]." A bare prediction with no supporting reference earns minimal marks — the "based on available information" in the definition is the instruction to cite your source.'
  },

  'Deduce': {
    nesa: 'Draw conclusions.',
    commonMistake: 'Stating a conclusion without showing the logical steps from the given information to that conclusion.',
    inPractice: 'Show each inferential step explicitly: "From [given data], it follows that [inference], therefore [conclusion]." The reasoning pathway must be visible — not just the endpoint. This is more formally logical than predict: treat it like a proof, not a guess.'
  }

}

function boldDP(t){return t.replace(/((?:Re-read|Go back to) syllabus dot point [\d.]+)/g,'<strong>$1 (below)</strong>');}
function greenFl(t){return t.replace(/([Gg]reen flags?(?:\s+words?)?:?)/g,'🟢 $1');}
function fbFor(id,err,verb){
  if(err==='Did not address verb'&&verb&&VERB_FB[verb]){
    const v=VERB_FB[verb];
    const ipRaw=greenFl(v.inPractice);
    const gfIdx=ipRaw.indexOf('🟢');
    const ipMain=gfIdx>=0?ipRaw.slice(0,gfIdx).trim():ipRaw;
    const ipGF=gfIdx>=0?ipRaw.slice(gfIdx):null;
    const ipHTML=ipGF?ipMain+'<div class="verb-card-subbullet"><span class="verb-sub-bullet"></span><span>'+ipGF+'</span></div>':ipMain;
    return '<div class="verb-card">'
      +'<div class="verb-card-bullet"><span class="verb-bullet"></span><span><span class="verb-lbl-nesa">NESA Verb:</span> '+v.nesa+'</span></div>'
      +'<div class="verb-card-bullet"><span class="verb-bullet"></span><span><span class="verb-lbl-mistake">Common Mistakes:</span> '+v.commonMistake+'</span></div>'
      +'<div class="verb-card-bullet"><span class="verb-bullet"></span><span><span class="verb-lbl-practice">In Practice:</span> '+ipHTML+'</span></div>'
      +'</div>';
  }
  const PAPER_SPECIFIC=['Did not know theory','Calculation error — knowledge','Did not include detail / chemistry terminology'];
  const key=id+'||'+err;
  const specific=PAPER_SPECIFIC.includes(err)?(THEORY_FB[key]||CALC_KNOWLEDGE_FB[key]||TERMINOLOGY_FB[key]||REVIEW_FB[key]):null;
  return boldDP(specific||(ACTION[err]||'Review this against the marking guidelines and sample response. Then redo the question under timed conditions until the method is automatic.'));
}

function setStep(a){
  currentStep=a;
  maxStep=Math.max(maxStep,a);
  [...stepper.children].forEach((d,i)=>{
    d.className='dot'+(i<a?' done':i===a?' active':'');
    if(i!==a&&i>0&&i<=maxStep){d.style.cursor='pointer';d.title='Go to step '+(i+1);d.onclick=()=>show(STEP_SCREENS[i],i);}
    else{d.style.cursor='default';d.onclick=null;d.title='';}
  });
  if(stepLbl) stepLbl.textContent='Step '+(a+1)+' of 4';
  const backBtn=document.getElementById('backBtn');
  if(backBtn){backBtn.style.display=a>0?'inline':'none';backBtn.textContent=a>0?'← back':'';}
  const fwdBtn=document.getElementById('fwdBtn');
  if(fwdBtn){fwdBtn.style.display=(a<maxStep)?'inline':'none';}

function revealMCQ(){
  MCQ.forEach(q=>{
    const given=state.mcq[q.n];
    const correct=q.correct;
    const wrap=grid.querySelector('[data-q="'+q.n+'"]');
    if(!wrap)return;
    const correct_letters=Array.isArray(correct)?correct:[...correct];
    const isRight=correct_letters.includes(given);
    [...wrap.children].forEach(btn=>{
      const o=btn.dataset.o;
      btn.classList.remove('sel','wrong','correct-ans');
      if(o===given&&isRight){btn.classList.add('sel');}
      else if(o===given&&!isRight){btn.classList.add('wrong');}
      else if(correct_letters.includes(o)&&!isRight){btn.classList.add('correct-ans');}
    });
  });
}

      btn.style.cursor='pointer';
      btn.style.pointerEvents='auto';

<td><span class="modtag" style="background:${col.bg};color:${col.text}">${MOD[q.mod].n.replace('Module','Mod')}</span></td>
<td>${verbCell}</td>
<td style="text-align:center;color:var(--mut);font-size:13.5px">${q.marks}</td>
<td><div style="display:flex;align-items:center;flex-wrap:wrap">
<div class="gpm" data-id="${q.id}"><button data-m="full">Full</button><button data-m="partial">Partial</button><button data-m="zero">Zero</button></div>
<input class="pin" type="number" min="0" max="${q.marks}" placeholder="?" style="display:none" data-pin="${q.id}"><span style="font-size:12px;color:var(--mut);display:none;margin-left:5px" data-of="${q.id}">/ ${q.marks}</span>
</div><select class="errsel" data-err="${q.id}" style="display:none"><option value="">Why did you lose marks?</option>${ERRORS.map(e=>`<option>${e}</option>`).join('')}</select></td>`;
body.appendChild(tr);});
function secProg(){const n=Object.keys(state.sec).length;p3.style.width=(n/SEC.length*100)+'%';updateGo3();}
function setMode(id,mode){const q=SEC.find(s=>s.id===id);const tr=body.querySelector(`tr[data-id="${id}"]`);
const gpm=tr.querySelector('.gpm');[...gpm.children].forEach(b=>{b.className='';if(b.dataset.m===mode)b.className='on-'+mode[0];});
const pin=tr.querySelector('[data-pin]'),of=tr.querySelector('[data-of]'),sel=tr.querySelector('[data-err]');
pin.style.display=of.style.display=(mode==='partial')?'inline-block':'none';
sel.style.display=(mode==='partial'||mode==='zero')?'inline-block':'none';
state.sec[id]={mode,val:mode==='full'?q.marks:mode==='zero'?0:(+pin.value||0),err:sel.value};
if(mode==='partial'&&pin.value==='')pin.focus();secProg();}
body.onclick=e=>{const b=e.target.closest('.gpm button');if(!b)return;setMode(b.parentElement.dataset.id,b.dataset.m);};
body.addEventListener('input',e=>{const id=e.target.dataset.pin||e.target.dataset.err||null;if(!id||!state.sec[id])return;
if(e.target.dataset.pin){const q=SEC.find(s=>s.id===id);let v=+e.target.value||0;if(v>q.marks){e.target.style.borderColor='var(--red)';e.target.style.color='var(--red)';v=q.marks;e.target.value=v;setTimeout(()=>{e.target.style.borderColor='';e.target.style.color='';},700);}else if(v===q.marks&&q.marks>0){setMode(id,'full');return;}else if(v===0){setMode(id,'zero');return;}if(v<0){v=0;e.target.value=0;}state.sec[id].val=v;}
if(e.target.dataset.err)state.sec[id].err=e.target.value;});
go3btn.onclick=()=>{if(go3btn.disabled)return;
  s4.innerHTML='<div class="diag-loading"><div class="hs-spin"></div><div class="spin-label">Analysing your result…</div></div>';
  show('s4',3);
  setTimeout(()=>buildDiag(),2500);
};

/* ── RESULTS / DIAGNOSTIC ── */
const s4=document.createElement('section');s4.id='s4';s4.className='scr';s4.style.overflowY='auto';app.appendChild(s4);

function buildDiag(){
const mods={};Object.keys(MOD).forEach(m=>mods[m]={earned:0,total:0});
MCQ.forEach(q=>{mods[q.mod].total+=1;if(q.correct.includes(state.mcq[q.n]))mods[q.mod].earned+=1;});
SEC.forEach(q=>{mods[q.mod].total+=q.marks;const r=state.sec[q.id];if(r)mods[q.mod].earned+=r.val;});
let earned=0;Object.values(mods).forEach(m=>{earned+=m.earned;});earned=Math.round(earned);
const lost=Object.keys(mods).map(m=>({m,lost:mods[m].total-mods[m].earned,...mods[m]})).sort((a,b)=>b.lost-a.lost);
const worst=lost[0];
const errAgg={};SEC.forEach(q=>{const r=state.sec[q.id];if(r&&(r.mode==='partial'||r.mode==='zero')&&r.err){const l=q.marks-r.val;if(!errAgg[r.err])errAgg[r.err]={lost:0,c:0};errAgg[r.err].lost+=l;errAgg[r.err].c++;}});
const errSorted=Object.entries(errAgg).filter(([,v])=>v.lost>0).sort((a,b)=>b[1].lost-a[1].lost);
const maxErr=errSorted.length?errSorted[0][1].lost:1;
// Build module × error combos ranked by marks lost
const modErrMap={};
SEC.forEach(q=>{const r=state.sec[q.id];if(r&&(r.mode==='partial'||r.mode==='zero')&&r.err){const l=q.marks-r.val;if(l>0){const key=q.mod+'||'+r.err;if(!modErrMap[key])modErrMap[key]={mod:q.mod,err:r.err,lost:0};modErrMap[key].lost+=l;}}});
const modErrSorted=Object.values(modErrMap).sort((a,b)=>b.lost-a.lost);
const prios=modErrSorted.slice(0,3).map(x=>({mod:x.mod,err:x.err,lost:x.lost,action:ACTION[x.err]||`Revisit the ${MOD[x.mod].full} theory — textbook and class notes — then redo the questions you missed under timed conditions.`}));
// fallback: pad with highest-loss modules if fewer than 3 errors logged
if(prios.length<3){const used=new Set(prios.map(p=>p.mod+'||'+p.err));for(const x of lost){if(prios.length>=3)break;if(x.lost<=0)continue;const key=x.m+'||';if(!used.has(key)){used.add(key);prios.push({mod:x.m,err:null,lost:x.lost,action:`Revisit the ${MOD[x.m].full} theory — textbook and class notes — then redo the questions you missed under timed conditions.`});}}}

function pct(m){return mods[m]&&mods[m].total?Math.round(mods[m].earned/mods[m].total*100):0;}
function band(p){return p>=70?['Strong','var(--g)']:p>=55?['Below target','var(--amber)']:['Needs work','var(--red)'];}
// Pre-build priority HTML outside the big innerHTML string to avoid template nesting issues
const NUM_COLS=['var(--g)','var(--amber)','#1e5799'];
const PC_GLOW=['rgba(45,80,22,.08)','rgba(169,106,18,.08)','rgba(30,87,153,.08)'];
let prioHTML='';
if(prios.length){
  prios.forEach((p,i)=>{
    const col=mc(p.mod);
    const emoji=p.err?(EMOJI_MAP[p.err]||'📌'):'📖';
    const numCol=NUM_COLS[i]||'var(--g)';
    const modLabel=MOD[p.mod].n.replace('Module','Mod');
    const errLabel=p.err||MOD[p.mod].full;
    const marksLabel=p.lost+' mark'+(p.lost!==1?'s':'')+' left';
    const pc=NUM_COLS[i]||'var(--g)';
    const glow=PC_GLOW[i]||'rgba(45,80,22,.08)';
    prioHTML+='<div class="prio'+(i===0?' prio-active':'')+'" data-prio="'+i+'" data-prio-err="'+(p.err||'')+'" style="--pc:'+pc+';--pc-glow:'+glow+'" onclick="hsSpot('+i+')">'
      +'<div class="prio-left">'
        +'<div class="prio-top-row"><div class="prio-num" style="color:'+numCol+'">'+(i+1)+'</div><div class="prio-emoji">'+emoji+'</div></div>'
        +'<span class="modtag" style="background:'+col.bg+';color:'+col.text+';align-self:flex-start">'+modLabel+'</span>'
        +'<div class="prio-err">'+errLabel+'</div>'
        +'<div class="prio-marks"><b>'+p.lost+' mark'+(p.lost!==1?'s':'')+'</b> left</div>'
        +'<div class="bar" style="margin-top:6px"><i data-prio-bar="'+i+'" data-w="0" style="background:'+pc+'"></i></div>'
      +'</div>'
      +'<div class="prio-right"><div class="prio-action">'+p.action+'</div></div>'
    +'</div>';
  });
}else{
  prioHTML='<div style="font-size:15px;color:var(--mut)">Nothing urgent — keep doing timed papers to stay sharp.</div>';
}
const sentence=worst.lost<=0
  ?`Clean sweep — <b>${earned}/100</b>. Lock in what's working and keep the run going.`
  :`<b>${MOD[worst.m].n}</b> is your biggest opportunity — <b>${worst.lost} Marks</b> are recoverable here, and fixing this module will move your score more than anything else.`;
const today=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short'});
// ── Question review panel: every missed Section II response, ordered by priority ──
const TAG_STYLES=[{bg:'var(--g50)',text:'var(--g)'},{bg:'var(--amber50)',text:'var(--amber)'},{bg:'#e8f0f8',text:'#1e5799'}];
const allMissed=SEC.map(q=>({q,r:state.sec[q.id]})).filter(x=>x.r&&(x.r.mode==='partial'||x.r.mode==='zero')&&(x.q.marks-x.r.val)>0&&x.r.err);
allMissed.forEach(m=>{m.prioIdx=prios.findIndex(p=>p.err?(p.mod===m.q.mod&&p.err===m.r.err):(p.mod===m.q.mod));if(m.prioIdx<0)m.prioIdx=3;});
const missed=allMissed;
const otherQs=missed.filter(m=>m.prioIdx===3);
if(otherQs.length){prioHTML+='<div class="prio-other" data-prio="3" onclick="hsSpot(3)"><span style="font-size:12.5px;font-weight:700;color:#a96a12;letter-spacing:.06em">OTHER</span><span style="font-size:11.5px;color:#c49a30">'+(otherQs.length)+' question'+(otherQs.length!==1?'s':'')+' — not a top priority</span></div>';}
const ordered=missed.slice().sort((a,b)=>a.prioIdx-b.prioIdx);
const qToPrio={};const prioQ=[...prios.map(()=>[]),[]];//index 3 = OTHER
missed.forEach(m=>{qToPrio[m.q.id]=m.prioIdx;if(m.prioIdx>=0)prioQ[m.prioIdx].push(m.q.id);});
let qPanelHTML='';
if(ordered.length){
  ordered.forEach(m=>{
    const q=m.q,r=m.r,pi=m.prioIdx;
    const pc=pi<3?(NUM_COLS[pi]||'var(--g)'):'#c9922a';
    const tg=pi<3?TAG_STYLES[pi]:{bg:'#fef0d4',text:'#a96a12'};
    const scoreCol=r.val>0?'var(--amber)':'var(--red)';
    const fb=fbFor(q.id,r.err,q.verb);
    qPanelHTML+='<div class="qcard '+(pi===0?'q-lit':'q-dim')+'" data-id="'+q.id+'" data-prio="'+pi+'" style="--pc:'+pc+'">'
      +'<div class="qhead" onclick="hsToggleQ(\''+q.id+'\')">'
        +'<span class="q-num">Q'+q.id+'</span>'
        +'<span class="q-title">'+q.t+'</span>'
        +'<span class="q-score" style="color:'+scoreCol+'">'+r.val+'/'+q.marks+'</span>'
        +'<span class="q-tag" style="background:'+tg.bg+';color:'+tg.text+'">'+r.err+'</span>'
        +'<span class="q-chev">▶</span>'
      +'</div>'
      +'<div class="qbody"><div class="qinner">'
        +'<div class="q-errlabel">✕ '+r.err+'</div>'
        +'<div class="q-fb">'+fb+'</div>'
        +(q.dp&&DP[q.dp]?'<div class="q-dp"><div class="q-dp-row"><span class="q-dp-lbl">syllabus dot point</span><span class="q-dp-short">'+DP[q.dp].short+'</span><button class="q-dp-expand-btn" onclick="event.stopPropagation();hsDpToggle(this.closest(\'.q-dp\'))">show full ↓</button></div><div class="q-dp-full">'+DP[q.dp].full+'</div></div>':'')
        +'<button class="q-review-btn q-action" onclick="hsReview(\''+q.id+'\')">✓ Mark reviewed</button>'
      +'</div></div>'
    +'</div>';
  });
}else{
  qPanelHTML='<div style="padding:18px 16px;font-size:13px;color:var(--mut)">No questions to review — clean execution across Section II.</div>';
}
s4.innerHTML=`
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;margin-bottom:4px">
  <div class="receipt">James Ruse 2024 Chemistry — reviewed ${today}</div>
  <div style="text-align:right;border:0.5px solid var(--ln);border-radius:9px;padding:8px 13px;background:var(--card);flex-shrink:0">
    <div style="font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px">JR 2024 cohort</div>
    <div style="font-size:13px;font-weight:600;color:var(--ink)"><span style="font-weight:400;color:var(--mut)">Median 73</span> &nbsp;·&nbsp; Mean 71.5</div>
  </div>
</div>
<div class="scorewrap"><div class="score" id="scoreNum">0<small>/100</small></div><div class="psent">${sentence}</div></div>
<div class="sub-h">📊 Module breakdown</div>
<div class="mod-grid">${Object.keys(MOD).map(m=>{const p=pct(m);const b=band(p);const col=mc(m);return `<div class="mod-card" style="border-left:3px solid ${col.text}"><div class="mn">${MOD[m].n}</div><div class="ms">${MOD[m].full}</div><div class="row"><span class="pct" style="color:${col.text}">${p}%</span><span class="lab" style="background:${b[1]}">${b[0]}</span></div><div style="font-size:12.5px;color:var(--mut);margin-top:5px">${Math.round(mods[m].earned)} / ${mods[m].total} Marks</div><div class="bar"><i data-w="${p}" style="background:${col.text}"></i></div></div>`;}).join('')}</div>
<div class="sub-h">⚠️ Error pattern — where your marks actually went</div>
${errSorted.length
  ?`<div>${errSorted.map(([e,v])=>`<div class="err-row"><span class="nm">${e}</span><span class="eb"><i data-w="${Math.round(v.lost/maxErr*100)}"></i></span><span class="ev">${v.lost} Marks · ${v.c} Qs</span></div>`).join('')}</div>`
  :`<div style="font-size:15px;color:var(--mut)">No recurring error pattern — strong execution across Section II.</div>`}
<div class="diag-prio-wrap">
  <div class="diag-prio-col">
    <div class="sub-h">🎯 Top 3 priorities</div>
    <div class="diag-prio-list">${prioHTML}</div>
  </div>
  <div class="diag-q-col">
    <div class="sub-h" style="visibility:hidden" aria-hidden="true">Question review</div>
    <div class="qpanel">${qPanelHTML}</div>
  </div>
</div>
<div class="sub-h">📄 Try these next</div>
<div class="rec-insight">${worst.lost>0?MOD[worst.m].n+' is your weakest module — these papers are weighted there.':'Strong result — these papers will push your consistency further.'}</div>
<div class="rec-row">
  <div class="rec-card">
    <div class="rec-title">Sydney Boys 2024</div>
    <div class="rec-body">40% Module 6 questions — targeted exposure on your weakest area. The mark allocation mirrors exactly what you need to rebuild.</div>
  </div>
  <div class="rec-card">
    <div class="rec-title">North Sydney Girls 2023</div>
    <div class="rec-body">6 extended-response questions across Modules 7 & 8. Trains the multi-part structure that cost you marks here.</div>
  </div>
</div>
<div class="soon">More subjects coming soon</div>`;
DIAG={s4,prios,active:0,reviewed:{},qToPrio,prioQ};
revealMCQ();
requestAnimationFrame(()=>{
let t0=null;const dur=900;const el=s4.querySelector('#scoreNum');
function tick(ts){if(!t0)t0=ts;const k=Math.min(1,(ts-t0)/dur);const v=Math.round(earned*(1-Math.pow(1-k,3)));el.innerHTML=v+'<small>/100</small>';if(k<1)requestAnimationFrame(tick);}
requestAnimationFrame(tick);
setTimeout(()=>{s4.querySelectorAll('.bar>i,.eb>i').forEach(b=>{b.style.width=b.dataset.w+'%';});},120);
setTimeout(()=>{const first=s4.querySelector('.qcard.q-lit');if(first)first.classList.add('q-open');},400);
});
}
// Exposed globally so the nav button can call it
window.demoFill=function(){
  // Fill MCQ — all correct, wrong on 5 questions
  MCQ.forEach(q=>{state.mcq[q.n]=q.correct[0];});
  state.mcq[9]='B';state.mcq[13]='C';state.mcq[16]='C';state.mcq[17]='A';state.mcq[20]='C';
  // Fill Section II
  SEC.forEach(q=>{state.sec[q.id]=DEMO_SEC_DATA[q.id]||{mode:'full',val:q.marks,err:''};});
  // Jump straight to diagnostic
  s4.innerHTML='<div class="diag-loading"><div class="hs-spin"></div><div class="spin-label">Analysing your result…</div></div>';
  show('s4',3);
  setTimeout(()=>buildDiag(),1000);
};
// ── Spotlight: switch which priority's questions are lit ──
window.hsSpot=function(i){
  if(!DIAG)return;DIAG.active=i;const root=DIAG.s4;
  root.querySelectorAll('.prio[data-prio],.prio-other[data-prio]').forEach(c=>c.classList.toggle('prio-active',+c.dataset.prio===i));
  root.querySelectorAll('.qcard').forEach(c=>{const lit=+c.dataset.prio===i;c.classList.toggle('q-lit',lit);c.classList.toggle('q-dim',!lit);c.classList.remove('q-open');});
  const panel=root.querySelector('.qpanel');
  if(!panel)return;
  if(i===3){
    const firstOther=[...root.querySelectorAll('.qcard')].find(c=>+c.dataset.prio===3);
    if(firstOther){const pt=panel.getBoundingClientRect().top;const et=firstOther.getBoundingClientRect().top;panel.scrollTo({top:panel.scrollTop+(et-pt)-8,behavior:'smooth'});}
  }else{
    panel.scrollTo({top:0,behavior:'smooth'});
  }
};
// ── Accordion: open one question at a time, keep it in view ──
window.hsToggleQ=function(id){
  if(!DIAG)return;const root=DIAG.s4;
  const card=[...root.querySelectorAll('.qcard')].find(c=>c.dataset.id===id);
  if(!card)return;
  // Universal spotlight: clicking a question in a non-active priority switches the spotlight to it first
  const cardPrio=+card.dataset.prio;
  if(cardPrio>=0&&cardPrio!==DIAG.active)hsSpot(cardPrio);
  const willOpen=!card.classList.contains('q-open');
  root.querySelectorAll('.qcard.q-open').forEach(c=>c.classList.remove('q-open'));
  if(willOpen){card.classList.add('q-open');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
};
// ── Dot point expand ──
window.hsDpToggle=function(el){const open=el.querySelector('.q-dp-full').classList.toggle('open');el.querySelector('.q-dp-expand-btn').textContent=open?'hide ↑':'show full ↓';};
// ── Mark reviewed: strike question, swap button, advance priority bar ──
window.hsReview=function(id){
  if(!DIAG)return;DIAG.reviewed[id]=true;const root=DIAG.s4;
  const card=[...root.querySelectorAll('.qcard')].find(c=>c.dataset.id===id);
  if(card){card.classList.add('q-reviewed');const btn=card.querySelector('.q-action');if(btn)btn.outerHTML='<span class="q-reviewed-txt">✓ Reviewed</span>';}
  const pi=DIAG.qToPrio[id];
  if(pi>=0&&pi<DIAG.prioQ.length){const ids=DIAG.prioQ[pi];const done=ids.filter(x=>DIAG.reviewed[x]).length;const w=ids.length?Math.round(done/ids.length*100):0;const bar=root.querySelector('.prio[data-prio="'+pi+'"] [data-prio-bar]');if(bar)bar.style.width=w+'%';}
};
})();
</script>
</body>
</html>
